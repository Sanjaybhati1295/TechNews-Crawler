name: Daily Tech News Crawl

on:
  schedule:
    # Runs every day at 07:00 UTC (12:30 IST)
    - cron: "0 7 * * *"
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: write          # needed to commit output files back to the repo

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python fetcher.py

      - name: Commit and push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "🤖 Daily news update — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
