<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech News Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,500;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0b0d11;
      --surface: #13161d;
      --border:  #22262f;
      --text:    #d4d9e8;
      --muted:   #5a6178;
      --accent:  #5cffe4;
      --orange:  #ff8c42;
      --red:     #ff4f6d;
      --mono:    'Space Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      background: rgba(11,13,17,0.92);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .logo span { color: var(--muted); }

    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .header-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Controls ── */
    .controls {
      padding: 1.25rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.9rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.78rem;
      outline: none;
      width: 260px;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.9rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(92,255,228,0.07);
    }

    .stats {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }
    .stats b { color: var(--accent); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
    }

    .card {
      background: var(--bg);
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: transparent;
      transition: background 0.15s;
    }
    .card:hover { background: var(--surface); }
    .card:hover::before { background: var(--accent); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .source-badge {
      font-family: var(--mono);
      font-size: 0.64rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.55rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .cat-badge {
      font-family: var(--mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--orange);
    }

    .date {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    .card-title {
      font-size: 0.96rem;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
    }
    .card-title a {
      color: inherit;
      text-decoration: none;
    }
    .card-title a:hover { color: var(--accent); }

    .card-summary {
      font-size: 0.83rem;
      line-height: 1.6;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Empty / Loading ── */
    .empty {
      grid-column: 1 / -1;
      padding: 4rem 2rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }
    .empty code {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--accent);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    @media (max-width: 640px) {
      header { padding: 1rem; }
      .controls { padding: 1rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="pulse"></div>
  <div class="logo">TECH<span>/</span>PULSE</div>
  <div class="header-meta" id="last-updated">loading…</div>
</header>

<div class="controls">
  <input class="search-box" id="search" type="text" placeholder="search articles…" />
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="ai">AI</button>
  <button class="filter-btn" data-cat="programming">Code</button>
  <button class="filter-btn" data-cat="research">Research</button>
  <button class="filter-btn" data-cat="engineering">Eng</button>
  <button class="filter-btn" data-cat="community">Community</button>
  <span class="stats" id="stats"></span>
</div>

<div class="grid" id="grid"></div>

<footer>
  <span>Powered by free RSS feeds · No API keys · Updated daily via GitHub Actions</span>
  <span id="footer-count"></span>
</footer>

<script>
  let allArticles = [];
  let activeCategory = "all";

  // ── Load data ────────────────────────────────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch("output/latest.json");
      const data = await res.json();
      allArticles = data.articles || [];

      const ts = new Date(data.generated_at);
      document.getElementById("last-updated").textContent =
        "Last crawl: " + ts.toUTCString().replace(" GMT", " UTC");
      document.getElementById("footer-count").textContent =
        data.total + " articles in database";

      render();
    } catch (e) {
      document.getElementById("grid").innerHTML =
        `<div class="empty">
           No data found. Run the crawler first:
           <code>python fetcher.py</code>
         </div>`;
    }
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function render() {
    const query = document.getElementById("search").value.toLowerCase();

    const filtered = allArticles.filter(a => {
      const matchCat  = activeCategory === "all" || a.category === activeCategory;
      const matchText = !query ||
        a.title.toLowerCase().includes(query) ||
        (a.summary || "").toLowerCase().includes(query) ||
        a.source.toLowerCase().includes(query);
      return matchCat && matchText;
    });

    document.getElementById("stats").innerHTML =
      `<b>${filtered.length}</b> / ${allArticles.length} articles`;

    if (!filtered.length) {
      document.getElementById("grid").innerHTML =
        `<div class="empty">No articles match your filter.</div>`;
      return;
    }

    document.getElementById("grid").innerHTML = filtered.map(a => {
      const date = a.published
        ? new Date(a.published).toLocaleDateString("en-GB", { day: "numeric", month: "short" })
        : "—";
      return `
        <div class="card">
          <div class="card-meta">
            <span class="source-badge">${esc(a.source)}</span>
            <span class="cat-badge">${esc(a.category)}</span>
            <span class="date">${date}</span>
          </div>
          <div class="card-title">
            <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a>
          </div>
          ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
        </div>`;
    }).join("");
  }

  function esc(s) {
    return String(s || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  // ── Events ───────────────────────────────────────────────────────────────────
  document.getElementById("search").addEventListener("input", render);

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeCategory = btn.dataset.cat;
      render();
    });
  });

  loadData();
</script>
</body>
</html>
